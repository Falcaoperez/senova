{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - GESICOM</title>
    <link rel="stylesheet" href="{% static 'CSS/editar.css' %}">
</head>
<body>
    <header style="display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;">
        <div style="display: flex; align-items: center;">
            <a href="javascript:history.back()" class="back-arrow" title="Volver" style="text-decoration: none; font-size: 1.5rem; margin-right: 1rem; color: #2a5c1a; display: flex; align-items: center;">←</a>
            <img src="{% static '/img/gesicom.png' %}" alt="GESICOM" class="logo">
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <nav style="display: flex; align-items: center; gap: 15px;">
                <a href="{% url 'home' %}" style="text-decoration: none; color: #2a5c1a; font-weight: 600;">Inicio</a>
                <a href="{% url 'evidencia' %}" style="text-decoration: none; color: #2a5c1a; font-weight: 600;">Evidencia</a>
            </nav>
            <div style="display: flex; align-items: center; gap: 10px; padding-left: 20px; border-left: 1px solid #d4e8c0;">
                <div style="text-align: right;">
                    <span style="display: block; font-weight: 700; color: #2a5c1a; font-size: 0.9rem;">{{ user.get_full_name|default:user.username }}</span>
                    <small style="color: #6a8c5a; font-size: 0.75rem;">{{ user.email }}</small>
                </div>
            </div>
        </div>
    </header>

    <div class="content">
        <h1>Editar Perfil</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}" style="background: #d1f4d1; color: #166534; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label for="username">Nombre de Usuario</label>
            <div class="input-row">
                <span class="input-icon left">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </span>
                <input class="input-linea" type="text" id="username" name="username" value="{{ user.username }}" required>
            </div>

            <label for="nombre">Nombre</label>
            <div class="input-row">
                <span class="input-icon left">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </span>
                <input class="input-linea" type="text" id="nombre" name="nombre" value="{{ user.first_name }}" required>
            </div>

            <label for="apellido">Apellido</label>
            <div class="input-row">
                <span class="input-icon left">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </span>
                <input class="input-linea" type="text" id="apellido" name="apellido" value="{{ user.last_name }}" required>
            </div>

            <label for="correo">Correo Electrónico</label>
            <div class="input-row">
                <span class="input-icon left">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" fill="none"/>
                        <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </span>
                <input class="input-linea" type="email" id="correo" name="correo" value="{{ user.email }}" required>
            </div>

            <label for="contrasena">Contraseña (opcional, 8 caracteres)</label>
            <div class="input-row">
                <span class="input-icon left">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </span>
                <input class="input-linea" type="password" id="contrasena" name="contrasena" placeholder="Nueva contraseña (8 caracteres)">
            </div>

            <button type="submit" class="btn-guardar">Guardar</button>
        </form>
    </div>
</body>
</html>
