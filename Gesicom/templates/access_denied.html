<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #dc3545; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .btn { background: #007a3d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Acceso Denegado</h1>
        <p>No tienes permisos suficientes para acceder a esta sección. Por favor, contacta con el administrador si crees que esto es un error.</p>
        <a href="javascript:history.back()" class="btn">Volver atrás</a>
    </div>
</body>
</html>
